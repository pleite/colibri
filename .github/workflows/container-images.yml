name: container-images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
    strategy:
      fail-fast: false
      matrix:
        backend:
          - vulkan
          - rocm
          - npu
          - all

    steps:
      - name: Install Git and container tooling
        run: |
          set -e
          dnf upgrade -y --setopt=install_weak_deps=False
          dnf install -y --setopt=install_weak_deps=False git curl tar gzip bzip2 ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/colibri-${{ matrix.backend }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.backend }}
            type=raw,value=${{ matrix.backend }}-{{sha}}
            type=ref,event=branch,suffix=-${{ matrix.backend }}
            type=ref,event=tag,suffix=-${{ matrix.backend }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.colibri
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BACKEND=${{ matrix.backend }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: container-images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# The default GitHub Actions token is used for GHCR pushes, so the workflow
# must retain the packages:write permission in this job.

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64, fedora]
    strategy:
      fail-fast: false
      matrix:
        backend:
          - vulkan
          - rocm
          - npu
          - all

    steps:
      - name: Install Git and container tooling
        run: |
          set -euo pipefail
          sudo dnf upgrade -y --setopt=install_weak_deps=False
          sudo dnf install -y --setopt=install_weak_deps=False \
            git curl tar gzip bzip2 ca-certificates podman

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          username="${{ github.actor }}"
          registry="${{ env.REGISTRY }}"
          password="${{ secrets.GITHUB_TOKEN}}"

          : "${username:?missing GitHub username}"
          : "${registry:?missing container registry}"
          : "${password:?missing GitHub token}"

          printf '%s' "$password" | podman login --username "$username" --password-stdin "$registry"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/colibri-${{ matrix.backend }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.backend }}
            type=raw,value=${{ matrix.backend }}-{{sha}}
            type=ref,event=branch,suffix=-${{ matrix.backend }}
            type=ref,event=tag,suffix=-${{ matrix.backend }}

      - name: Build and push container image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t tags < <(printf '%s\n' "$IMAGE_TAGS" | sed '/^$/d')
          if [ ${#tags[@]} -eq 0 ]; then
            echo "No container tags were generated" >&2
            exit 1
          fi

          primary_tag="${tags[0]}"
          podman build \
            --format docker \
            --platform linux/amd64 \
            --build-arg BACKEND=${{ matrix.backend }} \
            --file ./Dockerfile.colibri \
            --tag "$primary_tag" \
            .

          for tag in "${tags[@]:1}"; do
            podman tag "$primary_tag" "$tag"
          done

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            for tag in "${tags[@]}"; do
              podman push "$tag"
            done
          fi
